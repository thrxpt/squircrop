<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Squircrop — Free Squircle Image Cropper</title>
    <meta
      name="description"
      content="Free, open-source squircle image cropper. Crop any image into a smooth Figma-style squircle in your browser — tune corner radius and smoothing, export as PNG, JPEG, or SVG. No upload required."
    />

    <link rel="canonical" href="https://squircrop.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://squircrop.vercel.app/" />
    <meta property="og:title" content="Squircrop — Free Squircle Image Cropper" />
    <meta
      property="og:description"
      content="Free, open-source squircle image cropper. Crop any image into a smooth Figma-style squircle in your browser — tune corner radius and smoothing, export as PNG, JPEG, or SVG. No upload required."
    />
    <meta property="og:image" content="https://squircrop.vercel.app/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Squircrop — Free Squircle Image Cropper" />
    <meta
      name="twitter:description"
      content="Free, open-source squircle image cropper. Crop any image into a smooth Figma-style squircle in your browser — tune corner radius and smoothing, export as PNG, JPEG, or SVG. No upload required."
    />
    <meta name="twitter:image" content="https://squircrop.vercel.app/og-image.png" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Squircrop",
        "url": "https://squircrop.vercel.app/",
        "description": "Crop any image into a smooth Figma-style squircle in your browser. Tune corner radius and smoothing, then export as PNG, JPEG, or SVG.",
        "applicationCategory": "DesignApplication",
        "operatingSystem": "Any",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>

    <script>
      (function () {
        try {
          var s = localStorage.getItem("vite-ui-theme") || "system";
          if (s === "system") {
            s = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.classList.add(s);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
